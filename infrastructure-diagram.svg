<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #34495e; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
      .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
      .container { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 2; rx: 8; }
      .frontend { fill: #3498db; stroke: #2980b9; stroke-width: 2; rx: 6; }
      .backend { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; rx: 6; }
      .database { fill: #f39c12; stroke: #e67e22; stroke-width: 2; rx: 6; }
      .external { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; rx: 6; }
      .cloud { fill: #1abc9c; stroke: #16a085; stroke-width: 2; rx: 6; }
      .arrow { stroke: #34495e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .bidirectional { stroke: #34495e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">BGR (Board Game Review) - Infrastructure Architecture</text>

  <!-- User/Client Layer -->
  <rect x="50" y="70" width="1100" height="120" class="container" />
  <text x="70" y="95" class="subtitle">Client Layer</text>
  
  <!-- Web Browser -->
  <rect x="100" y="110" width="200" height="60" class="frontend" />
  <text x="200" y="135" text-anchor="middle" class="subtitle" fill="white">Web Browser</text>
  <text x="200" y="150" text-anchor="middle" class="text" fill="white">Chrome, Safari, Firefox</text>
  <text x="200" y="165" text-anchor="middle" class="small-text" fill="white">Responsive UI</text>

  <!-- Mobile App -->
  <rect x="350" y="110" width="200" height="60" class="frontend" />
  <text x="450" y="135" text-anchor="middle" class="subtitle" fill="white">Mobile Browser</text>
  <text x="450" y="150" text-anchor="middle" class="text" fill="white">iOS Safari, Android Chrome</text>
  <text x="450" y="165" text-anchor="middle" class="small-text" fill="white">PWA Ready</text>

  <!-- CDN -->
  <rect x="850" y="110" width="200" height="60" class="cloud" />
  <text x="950" y="135" text-anchor="middle" class="subtitle" fill="white">CDN</text>
  <text x="950" y="150" text-anchor="middle" class="text" fill="white">Static Assets</text>
  <text x="950" y="165" text-anchor="middle" class="small-text" fill="white">Images, CSS, JS</text>

  <!-- Frontend Layer -->
  <rect x="50" y="220" width="550" height="150" class="container" />
  <text x="70" y="245" class="subtitle">Frontend Layer (Render.com)</text>
  
  <!-- Next.js App -->
  <rect x="100" y="270" width="220" height="80" class="frontend" />
  <text x="210" y="295" text-anchor="middle" class="subtitle" fill="white">Next.js 14</text>
  <text x="210" y="310" text-anchor="middle" class="text" fill="white">App Router + TypeScript</text>
  <text x="210" y="325" text-anchor="middle" class="small-text" fill="white">SSR/CSR Hybrid</text>
  <text x="210" y="340" text-anchor="middle" class="small-text" fill="white">Material-UI + Tailwind</text>

  <!-- Node.js Runtime -->
  <rect x="350" y="270" width="220" height="80" class="frontend" />
  <text x="460" y="295" text-anchor="middle" class="subtitle" fill="white">Node.js Runtime</text>
  <text x="460" y="310" text-anchor="middle" class="text" fill="white">v18.17.0+</text>
  <text x="460" y="325" text-anchor="middle" class="small-text" fill="white">SWR Cache</text>
  <text x="460" y="340" text-anchor="middle" class="small-text" fill="white">API Client</text>

  <!-- Backend Layer -->
  <rect x="650" y="220" width="500" height="150" class="container" />
  <text x="670" y="245" class="subtitle">Backend Layer (Render.com)</text>
  
  <!-- Rails API -->
  <rect x="700" y="270" width="180" height="80" class="backend" />
  <text x="790" y="295" text-anchor="middle" class="subtitle" fill="white">Rails 8 API</text>
  <text x="790" y="310" text-anchor="middle" class="text" fill="white">Ruby 3.3+</text>
  <text x="790" y="325" text-anchor="middle" class="small-text" fill="white">Puma Server</text>
  <text x="790" y="340" text-anchor="middle" class="small-text" fill="white">REST API</text>

  <!-- Background Jobs -->
  <rect x="920" y="270" width="180" height="80" class="backend" />
  <text x="1010" y="295" text-anchor="middle" class="subtitle" fill="white">Solid Queue</text>
  <text x="1010" y="310" text-anchor="middle" class="text" fill="white">Background Jobs</text>
  <text x="1010" y="325" text-anchor="middle" class="small-text" fill="white">BGG Data Sync</text>
  <text x="1010" y="340" text-anchor="middle" class="small-text" fill="white">Translation Jobs</text>

  <!-- Database Layer -->
  <rect x="50" y="400" width="550" height="120" class="container" />
  <text x="70" y="425" class="subtitle">Database Layer (Render.com)</text>
  
  <!-- PostgreSQL -->
  <rect x="100" y="450" width="200" height="60" class="database" />
  <text x="200" y="475" text-anchor="middle" class="subtitle" fill="white">PostgreSQL</text>
  <text x="200" y="490" text-anchor="middle" class="text" fill="white">Primary Database</text>
  <text x="200" y="505" text-anchor="middle" class="small-text" fill="white">Games, Users, Reviews</text>

  <!-- Cache -->
  <rect x="350" y="450" width="200" height="60" class="database" />
  <text x="450" y="475" text-anchor="middle" class="subtitle" fill="white">Solid Cache</text>
  <text x="450" y="490" text-anchor="middle" class="text" fill="white">Application Cache</text>
  <text x="450" y="505" text-anchor="middle" class="small-text" fill="white">Query Results</text>

  <!-- External Services -->
  <rect x="650" y="400" width="500" height="180" class="container" />
  <text x="670" y="425" class="subtitle">External Services</text>
  
  <!-- BoardGameGeek API -->
  <rect x="700" y="450" width="180" height="60" class="external" />
  <text x="790" y="475" text-anchor="middle" class="subtitle" fill="white">BoardGameGeek</text>
  <text x="790" y="485" text-anchor="middle" class="text" fill="white">XML API</text>
  <text x="790" y="500" text-anchor="middle" class="small-text" fill="white">Game Data Source</text>

  <!-- Google Services -->
  <rect x="920" y="450" width="180" height="60" class="external" />
  <text x="1010" y="475" text-anchor="middle" class="subtitle" fill="white">Google Cloud</text>
  <text x="1010" y="485" text-anchor="middle" class="text" fill="white">Translate API</text>
  <text x="1010" y="500" text-anchor="middle" class="small-text" fill="white">OAuth2</text>

  <!-- OAuth Providers -->
  <rect x="700" y="520" width="180" height="50" class="external" />
  <text x="790" y="540" text-anchor="middle" class="subtitle" fill="white">OAuth Providers</text>
  <text x="790" y="555" text-anchor="middle" class="small-text" fill="white">Google, Twitter</text>

  <!-- Development & Deployment -->
  <rect x="50" y="600" width="1100" height="120" class="container" />
  <text x="70" y="625" class="subtitle">Development & Deployment</text>
  
  <!-- Docker -->
  <rect x="100" y="650" width="150" height="60" class="cloud" />
  <text x="175" y="675" text-anchor="middle" class="subtitle" fill="white">Docker</text>
  <text x="175" y="690" text-anchor="middle" class="text" fill="white">Containerization</text>
  <text x="175" y="705" text-anchor="middle" class="small-text" fill="white">Development</text>

  <!-- GitHub -->
  <rect x="300" y="650" width="150" height="60" class="cloud" />
  <text x="375" y="675" text-anchor="middle" class="subtitle" fill="white">GitHub</text>
  <text x="375" y="690" text-anchor="middle" class="text" fill="white">Source Control</text>
  <text x="375" y="705" text-anchor="middle" class="small-text" fill="white">CI/CD Actions</text>

  <!-- Render.com -->
  <rect x="500" y="650" width="200" height="60" class="cloud" />
  <text x="600" y="675" text-anchor="middle" class="subtitle" fill="white">Render.com</text>
  <text x="600" y="690" text-anchor="middle" class="text" fill="white">Cloud Platform</text>
  <text x="600" y="705" text-anchor="middle" class="small-text" fill="white">Auto Deploy</text>

  <!-- Monitoring -->
  <rect x="750" y="650" width="150" height="60" class="cloud" />
  <text x="825" y="675" text-anchor="middle" class="subtitle" fill="white">Monitoring</text>
  <text x="825" y="690" text-anchor="middle" class="text" fill="white">Logs & Metrics</text>
  <text x="825" y="705" text-anchor="middle" class="small-text" fill="white">Error Tracking</text>

  <!-- Security -->
  <rect x="950" y="650" width="150" height="60" class="cloud" />
  <text x="1025" y="675" text-anchor="middle" class="subtitle" fill="white">Security</text>
  <text x="1025" y="690" text-anchor="middle" class="text" fill="white">SSL/TLS</text>
  <text x="1025" y="705" text-anchor="middle" class="small-text" fill="white">JWT Auth</text>

  <!-- Arrows -->
  <!-- User to Frontend -->
  <line x1="200" y1="170" x2="200" y2="270" class="arrow" />
  <line x1="450" y1="170" x2="450" y2="270" class="arrow" />
  
  <!-- Frontend to Backend -->
  <line x1="570" y1="310" x2="700" y2="310" class="arrow" />
  
  <!-- Backend to Database -->
  <line x1="720" y1="350" x2="300" y2="450" class="arrow" />
  <line x1="800" y1="350" x2="450" y2="450" class="arrow" />
  
  <!-- Backend to External -->
  <line x1="880" y1="310" x2="880" y2="450" class="arrow" />
  <line x1="950" y1="310" x2="950" y2="450" class="arrow" />
  
  <!-- Background Jobs -->
  <line x1="1010" y1="350" x2="1010" y2="450" class="arrow" />
  
  <!-- CDN -->
  <line x1="850" y1="140" x2="570" y2="280" class="arrow" />

  <!-- Technology Labels -->
  <text x="600" y="750" text-anchor="middle" class="small-text">Key Technologies: Next.js 14, Rails 8, PostgreSQL, Docker, TypeScript, Material-UI</text>
  <text x="600" y="770" text-anchor="middle" class="small-text">Hosting: Render.com | External APIs: BoardGameGeek, Google Cloud Translate | Auth: Devise + OAuth2</text>
</svg>