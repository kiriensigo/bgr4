steps:
  # APIサービスのビルドとデプロイ
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/bgr4-api", "."]
    dir: "bgr4-api"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-api"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "bgr4-api",
        "--image",
        "gcr.io/$PROJECT_ID/bgr4-api",
        "--platform",
        "managed",
        "--region",
        "asia-northeast1",
        "--allow-unauthenticated",
        "--memory",
        "512Mi",
        "--cpu",
        "1",
        "--service-account",
        "bgr4-cloudrun-sa@$PROJECT_ID.iam.gserviceaccount.com",
        "--add-cloudsql-instances",
        "$PROJECT_ID:asia-northeast1:bgr4-db",
        "--set-secrets",
        "RAILS_MASTER_KEY=rails-master-key:latest,DATABASE_URL=database-url:latest",
        "--set-env-vars",
        "RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,RAILS_SERVE_STATIC_FILES=true,PORT=8080",
        "--command",
        "/rails/bin/docker-entrypoint",
        "--args",
        "bundle,exec,rails,server,-b,0.0.0.0,-p,8080",
      ]

  # APIサービスのURLを取得
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        API_URL=$(gcloud run services describe bgr4-api --platform managed --region asia-northeast1 --format='value(status.url)')
        echo "API_URL=$${API_URL}" >> /workspace/frontend_env.txt

  # フロントエンドサービスのビルドとデプロイ
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/bgr4-front",
        "-f",
        "Dockerfile.prod",
        ".",
      ]
    dir: "bgr4-front"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-front"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        source /workspace/frontend_env.txt
        gcloud run deploy bgr4-front \
          --image gcr.io/$PROJECT_ID/bgr4-front \
          --platform managed \
          --region asia-northeast1 \
          --allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --service-account bgr4-cloudrun-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --set-env-vars "NODE_ENV=production,NEXT_PUBLIC_API_URL=$${API_URL},NEXT_PUBLIC_BROWSER_API_URL=$${API_URL}"

# イメージをContainer Registryに保存
images:
  - "gcr.io/$PROJECT_ID/bgr4-api"
  - "gcr.io/$PROJECT_ID/bgr4-front"

substitutions:
  _RAILS_MASTER_KEY: "" # Secret Managerで管理するか、デプロイ時に指定
  _DATABASE_URL: "" # Cloud SQLの接続文字列。例: postgresql://postgres:password@/bgr4_production?host=/cloudsql/PROJECT_ID:REGION:INSTANCE_NAME

timeout: 3600s
