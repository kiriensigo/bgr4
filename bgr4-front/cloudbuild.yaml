steps:
  # DockerビルドとContainer Registry へのプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/bgr4-front",
        "-f",
        "Dockerfile.prod",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-front"]

  # Cloud Runへのデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "bgr4-front",
        "--image",
        "gcr.io/$PROJECT_ID/bgr4-front",
        "--platform",
        "managed",
        "--region",
        "asia-northeast1",
        "--allow-unauthenticated",
        "--memory",
        "512Mi",
        "--cpu",
        "1",
        "--set-env-vars",
        "NODE_ENV=production,NEXT_PUBLIC_API_URL=${_API_URL},NEXT_PUBLIC_BROWSER_API_URL=${_API_URL}",
      ]

# イメージをContainer Registryに保存
images:
  - "gcr.io/$PROJECT_ID/bgr4-front"

substitutions:
  _API_URL: "https://bgr4-api-y2i5irl3rq-an.a.run.app" # APIのURLを更新（デプロイ後に更新）

timeout: 1800s
