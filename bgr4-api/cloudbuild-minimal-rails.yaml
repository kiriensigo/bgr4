steps:
  # Dockerイメージのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v1",
        "-f",
        "Dockerfile.minimal-rails",
        ".",
      ]

  # イメージをContainer Registryにプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v1"]

  # Cloud Runへのデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - "gcloud"
      - "run"
      - "deploy"
      - "bgr4-api-minimal-rails"
      - "--image=gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v1"
      - "--region=asia-northeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=1"
      - "--timeout=300s"
      - "--port=8080"
      - "--set-env-vars=RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,SECRET_KEY_BASE=64b0847d9dcb93bdeb87994cbe3b060d4ddd5c2943936ab77aff0ff84ccd9fef91e60ec172f4deac2c7d85f4de1a68a1dbb0be1b0d0bdcd9f79ec75aea86efd7"

# ビルドで生成されるイメージ
images:
  - "gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v1"

# タイムアウト設定
timeout: "1800s" 