steps:
  # Dockerイメージのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/bgr4-api-db:v2"
      - "-f"
      - "Dockerfile.db"
      - "."

  # Google Container Registryへのプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/bgr4-api-db:v2"

  # Cloud Runへのデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "bgr4-api-db"
      - "--image=gcr.io/$PROJECT_ID/bgr4-api-db:v2"
      - "--region=asia-northeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=2"
      - "--timeout=300s"
      - "--port=8080"
      - "--set-env-vars=RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,INITIALIZE_DB=true,DATABASE_HOST=your-db-host,DATABASE_PORT=5432,DATABASE_USERNAME=iamtomatoo,DATABASE_PASSWORD=psotria1,DATABASE_NAME=bgr4db,SECRET_KEY_BASE=64b0847d9dcb93bdeb87994cbe3b060d4ddd5c2943936ab77aff0ff84ccd9fef91e60ec172f4deac2c7d85f4de1a68a1dbb0be1b0d0bdcd9f79ec75aea86efd7"

# 生成されるイメージの指定
images:
  - "gcr.io/$PROJECT_ID/bgr4-api-db:v2"

# タイムアウトの設定（30分）
timeout: "1800s"
