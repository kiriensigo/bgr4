steps:
  # イメージのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/bgr4-api-new-minimal:latest",
        "-f",
        "bgr4-api/Dockerfile.new-minimal",
        ".",
        "--progress=plain",
        "--no-cache",
      ]

  # Container Registryへのプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-api-new-minimal:latest"]

  # Cloud Runへのデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "bgr4-api-v2"
      - "--image=gcr.io/$PROJECT_ID/bgr4-api-new-minimal:latest"
      - "--region=asia-northeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=1"
      - "--max-instances=5"
      - "--timeout=600s"
      - "--port=8080"
      - "--set-env-vars=RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,DISABLE_DATABASE_CONNECTION=true,SECRET_KEY_BASE=dummy_key_for_build_only,RAILS_SERVE_STATIC_FILES=true,RAILS_STANDALONE_MODE=true,TZ=Asia/Tokyo"
      - "--service-account=bgr4-cloudrun-sa@bgr4-project.iam.gserviceaccount.com"
      - "--labels=run.googleapis.com/startupProbeType=Default"
      - "--command=/bin/sh"
      - "--args=-c,bundle exec puma -p ${PORT:-8080} -w 0"
      - "--no-cpu-throttling"

# 完了時に生成されるイメージ
images:
  - "gcr.io/$PROJECT_ID/bgr4-api-new-minimal:latest"

# ビルドのタイムアウト（3600秒 = 1時間）
timeout: 3600s
