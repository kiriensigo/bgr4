steps:
  # ビルドステップ
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/bgr4-api-simple-rails:v1",
        "-f",
        "Dockerfile.simple-rails",
        ".",
      ]
    id: "build"
    timeout: "1800s"

  # イメージのプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-api-simple-rails:v1"]
    id: "push"
    timeout: "900s"

  # デプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      [
        "run",
        "deploy",
        "bgr4-api-simple-rails",
        "--image",
        "gcr.io/$PROJECT_ID/bgr4-api-simple-rails:v1",
        "--platform",
        "managed",
        "--region",
        "asia-northeast1",
        "--allow-unauthenticated",
        "--memory",
        "1Gi",
        "--cpu",
        "1",
        "--port",
        "8080",
        "--set-env-vars",
        "RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,INITIALIZE_DB=true,DATABASE_HOST=${_DATABASE_HOST},DATABASE_PORT=${_DATABASE_PORT},DATABASE_USERNAME=${_DATABASE_USERNAME},DATABASE_NAME=${_DATABASE_NAME}",
        "--set-secrets",
        "DATABASE_PASSWORD=db-password:latest,SECRET_KEY_BASE=secret-key-base:latest,RAILS_MASTER_KEY=rails-master-key:latest",
      ]
    id: "deploy"
    timeout: "900s"

# タイムアウト（30分）
timeout: "1800s"

# 代入変数の定義
substitutions:
  _DATABASE_HOST: "your-db-host"
  _DATABASE_PORT: "5432"
  _DATABASE_USERNAME: "postgres"
  _DATABASE_NAME: "bgr4_production"
