steps:
  # Dockerイメージのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v4"
      - "-f"
      - "Dockerfile.minimal-rails-api"
      - "."

  # Google Container Registryへのプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v4"

  # Cloud Runへのデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "bgr4-api-minimal-rails"
      - "--image=gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v4"
      - "--region=asia-northeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=2"
      - "--timeout=300s"
      - "--port=8080"
      - "--set-env-vars=RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,SECRET_KEY_BASE=YOUR_SECRET_KEY_BASE_HERE"

# 生成されるイメージの指定
images:
  - "gcr.io/$PROJECT_ID/bgr4-api-minimal-rails:v4"

# タイムアウトの設定（30分）
timeout: "1800s"
