apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bgr4-api-games-db
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "5"
        autoscaling.knative.dev/minScale: "0"
    spec:
      containerConcurrency: 80
      containers:
        - image: gcr.io/bgr4-project/bgr4-api-games-db:latest
          ports:
            - containerPort: 8080
          env:
            - name: RACK_ENV
              value: "production"
            - name: PORT
              value: "8080"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
      timeoutSeconds: 300
  traffic:
    - percent: 100
      latestRevision: true
