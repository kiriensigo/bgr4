steps:
  # Dockerイメージのビルド（詳細ログ有効）
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/bgr4-api-minimal:latest",
        "-f",
        "bgr4-api/Dockerfile.minimal",
        ".",
        "--progress=plain",
        "--no-cache",
      ]

  # イメージをContainer Registryにプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-api-minimal:latest"]

  # 最小限の設定でCloud Runへデプロイ（シンプル化）
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "bgr4-api-minimal-direct",
        "--image=gcr.io/$PROJECT_ID/bgr4-api-minimal:latest",
        "--region=asia-northeast1",
        "--platform=managed",
        "--allow-unauthenticated",
        "--memory=512Mi",
        "--cpu=1",
        "--min-instances=1",
        "--max-instances=1",
        "--timeout=600s",  # タイムアウトを10分に延長
        "--port=8080",
        "--set-env-vars=RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,DISABLE_DATABASE_CONNECTION=true,RAILS_MASTER_KEY=temporary_key_for_testing,SECRET_KEY_BASE=temporary_base_key_for_testing_only",
        "--service-account=349403738734-compute@developer.gserviceaccount.com",
      ]

# ビルドで生成されるイメージ
images:
  - "gcr.io/$PROJECT_ID/bgr4-api-minimal:latest"

# タイムアウト設定を大幅に延長
timeout: 7200s
