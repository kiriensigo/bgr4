steps:
  # Dockerイメージのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/bgr4-api-minimal:v1",
        "-f",
        "Dockerfile.minimal",
        ".",
      ]

  # イメージをContainer Registryにプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/bgr4-api-minimal:v1"]

  # 最小限の設定でCloud Runへデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "bgr4-api-minimal",
        "--image=gcr.io/$PROJECT_ID/bgr4-api-minimal:v1",
        "--region=asia-northeast1",
        "--platform=managed",
        "--allow-unauthenticated",
        "--memory=512Mi",
        "--cpu=1",
        "--min-instances=1",
        "--max-instances=1",
        "--timeout=60s",
        "--port=8080",
        "--set-env-vars=RAILS_ENV=production,RAILS_LOG_TO_STDOUT=true,DISABLE_DATABASE_CONNECTION=true",
        "--set-secrets=RAILS_MASTER_KEY=rails-master-key:latest,SECRET_KEY_BASE=secret-key-base:latest",
      ]

# ビルドで生成されるイメージ
images:
  - "gcr.io/$PROJECT_ID/bgr4-api-minimal:v1"

# タイムアウト設定を延長
timeout: 3600s
