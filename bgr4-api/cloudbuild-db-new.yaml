steps:
  # Dockerコンテナのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/bgr4-api-db:latest"
      - "-f"
      - "bgr4-api/Dockerfile.db"
      - "."

  # GCRへのイメージのプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/bgr4-api-db:latest"

images:
  - "gcr.io/$PROJECT_ID/bgr4-api-db:latest"

timeout: "1800s"
